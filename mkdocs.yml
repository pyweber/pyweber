site_name: Pyweber Documentation
site_description: Pyweber is a lightweight Python web framework for reactive web applications with real-time DOM updates.

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  favicon: images/favicon.ico

nav:
  - Home: index.md

  - Getting Started:
    - Installation: installation.md
    - Element model (important): guides/element-model.md
    - Reactivity & updates: guides/reactivity.md
    - Environment Variables: environment.md

  - Guides:
    - Components: guides/components.md
    - File streaming: guides/file-streaming.md
    - Routing (path & query): guides/routing-advanced.md
    - Deployment: guides/deployment.md

  - Core Framework:
    - PyWeber Application: core/pyweber.md
    - Request Handling: core/request.md
    - Response Generation: core/response.md
    - Headers Management: core/headers.md

  - Routing System:
    - Routes: routing/route.md
    - Route Manager: routing/routemanager.md
    - Redirects: routing/redirectroute.md

  - Templates & UI:
    - Templates: ui/template.md
    - Elements: ui/element.md
    - Template Results: ui/templateresult.md
    - Content Results: ui/contentresult.md
    - State Results: ui/stateresult.md

  - Forms & Files:
    - File Uploads: forms/file.md
    - Form Fields: forms/field.md
    - Field Storage: forms/fieldstorage.md

  - Browser Integration:
    - Window Management: browser/window.md
    - Screen Information: browser/screen.md
    - Location Handling: browser/location.md
    - Orientation: browser/orientation.md

  - Storage:
    - Local Storage: storage/localstorage.md
    - Session Storage: storage/sessionstorage.md
    - Base Storage: storage/basestorage.md

  - User Interaction:
    - Event Handlers: interaction/events.md
    - Prompts: interaction/prompt.md
    - Confirmations: interaction/confirm.md

  - Tools & CLI:
    - Command Line Interface: cli.md

  - Reference:
    - Examples: examples.md
    - Changelog: changelog.md
    - API index: documentation.md

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - admonition
  - pymdownx.details
  - attr_list
  - tables

plugins:
  - search
